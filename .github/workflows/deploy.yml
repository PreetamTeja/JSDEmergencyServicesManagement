name: Deploy Emergency App to S3 + CloudFront

# Builds the Vite SPA and deploys it on every push to main.
# Auth to AWS uses GitHub OIDC (no long-lived keys stored in GitHub).

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  id-token: write   # required for OIDC
  contents: read

concurrency:
  group: deploy-emergency
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      # Vite env (baked in at build time)
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
      VITE_MAIN_APP_URL: ${{ vars.VITE_MAIN_APP_URL }}
      VITE_COGNITO_REGION: ${{ vars.VITE_COGNITO_REGION }}
      VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID }}
      VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
      VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN }}
      VITE_ADMIN_GROUPS: ${{ vars.VITE_ADMIN_GROUPS }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          # hashed assets: long cache; index.html: no-cache so updates show immediately
          aws s3 sync dist/ "s3://${S3_BUCKET}/" --delete \
            --cache-control "public,max-age=31536000,immutable" --exclude "index.html"
          aws s3 cp dist/index.html "s3://${S3_BUCKET}/index.html" --cache-control "no-cache"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"
